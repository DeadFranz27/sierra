services:

  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/init-passwd.sh:/docker-entrypoint-init.d/init-passwd.sh:ro
      - mosquitto_data:/mosquitto/data
    entrypoint: ["sh", "/docker-entrypoint-init.d/init-passwd.sh"]
    environment:
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
      SIERRA_HUB_MQTT_USER: ${SIERRA_HUB_MQTT_USER}
      SIERRA_HUB_MQTT_PASS: ${SIERRA_HUB_MQTT_PASS}
    ports:
      # Default: bind on all interfaces so ESP devices on the LAN reach the broker.
      # Override MQTT_BIND=127.0.0.1 on a laptop without hardware.
      - "${MQTT_BIND:-0.0.0.0}:1883:1883"
    networks: [sierra]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on: [mosquitto]
    ports:
      # Backend is always reached through nginx in production; keep loopback by default.
      - "${BACKEND_BIND:-127.0.0.1}:8000:8000"
    volumes:
      - sierra_db:/app/data
    networks: [sierra]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      # Default: bind on all interfaces so phones/tablets on the LAN open https://<hub-ip>/.
      # Override HTTP_BIND=127.0.0.1 on a laptop without hardware.
      - "${HTTP_BIND:-0.0.0.0}:80:80"
      - "${HTTP_BIND:-0.0.0.0}:443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    networks: [sierra]

volumes:
  mosquitto_data:
  sierra_db:

networks:
  sierra:
    driver: bridge
