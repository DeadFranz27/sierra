services:

  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/init-passwd.sh:/docker-entrypoint-init.d/init-passwd.sh:ro
      - mosquitto_data:/mosquitto/data
    entrypoint: ["sh", "/docker-entrypoint-init.d/init-passwd.sh"]
    environment:
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
      SIERRA_HUB_MQTT_USER: ${SIERRA_HUB_MQTT_USER}
      SIERRA_HUB_MQTT_PASS: ${SIERRA_HUB_MQTT_PASS}
    ports:
      # Default: loopback only. On a Raspberry Pi serving real hardware on the LAN,
      # set MQTT_BIND=0.0.0.0 in .env so ESPHome devices can reach the broker.
      - "${MQTT_BIND:-127.0.0.1}:1883:1883"
    networks: [sierra]

  mock-hub:
    build: ./mock-hub
    restart: unless-stopped
    depends_on: [mosquitto]
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      SIERRA_HUB_MQTT_USER: ${SIERRA_HUB_MQTT_USER}
      SIERRA_HUB_MQTT_PASS: ${SIERRA_HUB_MQTT_PASS}
      MOCK_SCENARIO: ${MOCK_SCENARIO:-default}
      MOCK_TIME_SCALE: ${MOCK_TIME_SCALE:-1}
    # Admin API (8765) is NOT exposed to host — reachable only inside the sierra network
    # or via `docker compose exec mock-hub curl http://127.0.0.1:8765/state`
    networks: [sierra]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on: [mosquitto]
    ports:
      # Backend is always reached through nginx in production; keep loopback by default.
      - "${BACKEND_BIND:-127.0.0.1}:8000:8000"
    volumes:
      - sierra_db:/app/data
    networks: [sierra]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      # Default: loopback (laptop dev). On a Pi deployment, set HTTP_BIND=0.0.0.0 in .env
      # so phones/tablets on the LAN can open https://<pi-ip>/.
      - "${HTTP_BIND:-127.0.0.1}:80:80"
      - "${HTTP_BIND:-127.0.0.1}:443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    networks: [sierra]

volumes:
  mosquitto_data:
  sierra_db:

networks:
  sierra:
    driver: bridge
