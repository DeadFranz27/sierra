; Sierra sense-node — ESP32-WROOM-32 firmware
;
; Build:   pio run
; Flash:   pio run -t upload
; Monitor: pio device monitor

[env:esp32-wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

build_flags =
    -DFW_VERSION=\"0.1.0\"
    -DSIERRA_HUB_ID=\"001\"
    -DCORE_DEBUG_LEVEL=0
